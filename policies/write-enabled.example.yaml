# Example policy overlay when enabling write_file in config.
# Copy/adapt after signing for your deployment trust store.
version: "1"

defaults:
  effect: deny

rules:
  - id: allow-listed-capabilities
    effect: allow
    actions:
      - tool.invoke
    when:
      capability.in:
        - fs.read
        - fs.list
        - fs.search
        - fs.write
        - py.exec

  - id: deny-egress
    effect: deny
    actions:
      - network.egress
    when:
      always: true

  - id: deny-shell
    effect: deny
    actions:
      - tool.invoke
    when:
      tool.name_in:
        - shell
        - bash
        - exec
        - curl
        - wget

  - id: workspace-read
    effect: allow
    actions:
      - fs.read
    when:
      path.under_workspace: true

  - id: workspace-write
    effect: allow
    actions:
      - fs.write
    when:
      path.under_workspace: true
