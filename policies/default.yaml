# Declarative policy for tool and network actions (evaluated before execution).
version: "1"

defaults:
  effect: deny

rules:
  - id: allow-listed-capabilities
    effect: allow
    actions:
      - tool.invoke
    when:
      capability.in:
        - fs.read
        - fs.list
        - fs.search
        - fs.write
        - py.exec

  - id: deny-egress
    effect: deny
    actions:
      - network.egress
    when:
      always: true

  - id: deny-shell
    effect: deny
    actions:
      - tool.invoke
    when:
      tool.name_in:
        - shell
        - bash
        - exec
        - curl
        - wget

  - id: workspace-read-only-paths
    effect: allow
    actions:
      - fs.read
    when:
      path.under_workspace: true

  - id: workspace-list-paths
    effect: allow
    actions:
      - fs.list
    when:
      path.under_workspace: true

  - id: workspace-search-paths
    effect: allow
    actions:
      - fs.search
    when:
      path.under_workspace: true

  - id: workspace-writes
    effect: allow
    actions:
      - fs.write
    when:
      path.under_workspace: true
